<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calma Gest · Offline</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #FAF7F5; color: #2A2A2A; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
      .card { max-width: 420px; background: #FFFFFF; border-radius: 20px; padding: 24px; box-shadow: 0 8px 30px rgba(42,42,42,0.08); border: 1px solid #E5E1DF; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; margin: 0; color: #5B5B5B; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Estas offline</h1>
        <p>Calma Gest sigue en modo lectura. Cuando vuelvas a tener conexion, se actualizara.</p>
      </div>
    </div>
  </body>
</html>
